<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Антон</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="centered">
    <div class="scene dimmed" id="scene">
      <img src="image 22.png" alt="">
      <div class="hotspot" data-label="Обыскать" style="left:44%;top:36%;width:36%;height:28%"></div>
    </div>
    <div class="welcome-screen" id="welcomeScreen" role="dialog" aria-labelledby="welcomeTitle">
      <p class="welcome-text" id="welcomeTitle">Рейдер, найди свой подарок</p>
      <button type="button" class="welcome-btn" id="welcomeBtn">Искать</button>
    </div>
    <div class="tooltip" id="tooltip">Обыскать</div>
    <div class="item-card" id="itemCard">
      <div class="item-card-body">
        <h3 class="item-card-title" id="cardTitle"></h3>
        <p class="item-card-desc" id="cardDesc"></p>
        <p class="item-card-from" id="cardFrom"></p>
      </div>
      <div class="item-card-footer">
        <span id="cardQty"></span>
        <span id="cardWeight"></span>
        <span id="cardPrice"></span>
      </div>
    </div>
    <div class="overlay" id="overlay">
      <h2 class="overlay-title">Хлам Антона — 3/8</h2>
      <div class="loot-grid">
        <div class="loot-cell" data-loot="1.png"><img src="loot_box_empty.png" alt=""></div>
        <div class="loot-cell" data-loot="2.png"><img src="loot_box_empty.png" alt=""></div>
        <div class="loot-cell" data-loot="3.png" data-title="Пеллетный гриль" data-desc="Идеален для того, чтобы приготовить мясо для друзей." data-from="Дарят: Никита, Илья, Ден, Севак, Лёша и Вика" data-qty="1/1" data-weight="62.0" data-price="145 500 ₽"><img src="loot_box_empty.png" alt=""></div>
        <div class="loot-cell" data-loot=""><img src="loot_box_empty.png" alt=""></div>
        <div class="loot-cell" data-loot=""><img src="loot_box_empty.png" alt=""></div>
        <div class="loot-cell" data-loot=""><img src="loot_box_empty.png" alt=""></div>
        <div class="loot-cell" data-loot=""><img src="loot_box_empty.png" alt=""></div>
        <div class="loot-cell" data-loot=""><img src="loot_box_empty.png" alt=""></div>
      </div>
    </div>
  </div>

  <audio id="bgMusic" src="bg-music.mp3" loop preload="auto"></audio>
  <script src="js/main.js"></script>
</body>
</html>
